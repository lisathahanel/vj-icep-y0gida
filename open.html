<div id="embed-grid"></div>

<style>
#embed-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:12px;
  max-width:1100px;
  margin:20px auto;
}

.embed-box{
  position:relative;
  width:100%;
  height:10;
  padding-bottom:56.25%;
  background:#000;
  border-radius:10px;
  overflow:hidden;
}

.embed-box iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
}
</style>

<script>
// ==== SETTINGS ====
var postsPerLoad = 2;

// ==== STORAGE ====
var posts = [];

// ==== BLOGGER CALLBACK ====
function feed(json){
  if(json.feed && json.feed.entry){

    json.feed.entry.forEach(function(e){

      var linkObj = e.link.find(function(l){
        return l.rel === "alternate";
      });

      if(linkObj){
        posts.push(linkObj.href);
      }

    });

    renderEmbeds(); // load once after fetch
  }
}

// ==== RENDER (NO RELOAD) ====
function renderEmbeds(){
  var container = document.getElementById("embed-grid");

  var slice = posts.slice(0, postsPerLoad);

  slice.forEach(function(url){
    var box = document.createElement("div");
    box.className = "embed-box";

    var iframe = document.createElement("iframe");
    iframe.src = url;
    iframe.loading = "lazy";

    box.appendChild(iframe);
    container.appendChild(box);
  });
}

// ==== LOAD BLOGGER FEED ====
var s = document.createElement("script");
s.src = "https://www.gynecologist.shop/feeds/pages/default?alt=json-in-script&max-results=100&callback=feed";
document.body.appendChild(s);
</script>
