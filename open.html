<script>
// ==== SETTINGS ====
var postsPerLoad = 2;

// ==== STORAGE ====
var posts = [];

// ==== BLOGGER CALLBACK ====
function feed(json){
  if(json.feed && json.feed.entry){

    json.feed.entry.forEach(function(e){

      var linkObj = e.link.find(function(l){
        return l.rel === "alternate";
      });

      if(linkObj){
        posts.push(linkObj.href);
      }

    });

    renderEmbeds(); // load once after fetch
  }
}

// ==== RENDER (NO RELOAD) ====
function renderEmbeds(){
  var container = document.getElementById("e32d-g9d");

  var slice = posts.slice(0, postsPerLoad);

  slice.forEach(function(url){
    var box = document.createElement("div");
    box.className = "em6d-box";

    var iframe = document.createElement("iframe");
    iframe.src = url;
    iframe.loading = "lazy";

    box.appendChild(iframe);
    container.appendChild(box);
  });
}

// ==== LOAD BLOGGER FEED ====
var s = document.createElement("script");
s.src = "https://www.gynecologist.shop/feeds/pages/default?alt=json-in-script&max-results=100&callback=feed";
document.body.appendChild(s);
</script>

<script>
// ===== STORAGE =====
var allFeedEntries = [];
var feedsLoaded = 0;
var totalFeeds = 2;

var embedPages = [];
var embedFeedLoaded = false;

// ===== MAIN FEED =====
function renderMovieFeedRow(json) {
  if(json.feed && json.feed.entry){
    allFeedEntries = allFeedEntries.concat(json.feed.entry);
  }

  feedsLoaded++;

  if(feedsLoaded >= totalFeeds){

    allFeedEntries.sort(function(a,b){
      return new Date(b.published?.$t || 0) - new Date(a.published?.$t || 0);
    });

    var featuredPosts = allFeedEntries.slice(0, 100);

    featuredPosts.forEach(function(entry, index){
      renderMovieCard(entry, "f2ured-m3ie-g5d", index);
    });
  }
}

// ===== CARD =====
function renderMovieCard(entry, containerId, index){

  var title = entry.title?.$t || "Untitled";

  var url = (entry.link || []).find(l => l.rel === 'alternate')?.href || '#';

  var imgUrl =
    entry.media$thumbnail?.url?.replace('/s72-c/', '/s640/') ||
    entry.content?.$t?.match(/<img[^>]+src="([^">]+)"/)?.[1] ||
    'https://via.placeholder.com/300x450?text=No+Image';

  var container = document.getElementById(containerId);

  // NORMAL CARD
  var card = document.createElement('div');
  card.className = 'movie-card';

  card.innerHTML = `
    <a href="${url}" target="_blank">
      <div class="poster">
        <img src="${imgUrl}">
        <div class="play-button">&#9658;</div>
      </div>
      <div class="movie-title">${title}</div>
    </a>
  `;

  container.appendChild(card);

  // 🔥 EMBED EVERY 10
  if ((index + 1) % 10 === 0) {

    var embedCard = document.createElement('div');
    embedCard.className = 'movie-card embed-wrapper';

    var frameId = "embedFrame-" + index;

    embedCard.innerHTML = `
      <div class="embed-box">
        <iframe id="${frameId}" loading="lazy"></iframe>
      </div>
    `;

    container.appendChild(embedCard);

    loadEmbedIntoFrame(frameId);
  }
}

// ===== EMBED FEED =====
function embedFeed(json){
  if(json.feed && json.feed.entry){

    json.feed.entry.forEach(function(e){
      var linkObj = e.link.find(l => l.rel === "alternate");
      if(linkObj){
        embedPages.push(linkObj.href);
      }
    });

    embedFeedLoaded = true;
  }
}

// ===== LOAD INTO IFRAME (SMART WAIT) =====
function loadEmbedIntoFrame(frameId){

  function tryLoad(){
    if(embedFeedLoaded && embedPages.length > 0){

      var randomUrl = embedPages[Math.floor(Math.random()*embedPages.length)];

      var frame = document.getElementById(frameId);
      if(frame){
        frame.src = randomUrl;
      }

    } else {
      setTimeout(tryLoad, 400);
    }
  }

  tryLoad();
}

// ===== LOAD EMBED FEED FIRST =====
var embedScript = document.createElement("script");
embedScript.src = "https://www.paypalads.com/feeds/pages/default?alt=json-in-script&max-results=150&callback=embedFeed";
document.body.appendChild(embedScript);

var s2 = document.createElement("script");
s2.src = "https://www.marketing2advertising.com/feeds/pages/default?alt=json-in-script&max-results=150&callback=renderMovieFeedRow";
document.body.appendChild(s2);
</script>
